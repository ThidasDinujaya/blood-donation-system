spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users(?<segment>/?.*), /api/users${segment}

        # Auth Service Routes
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth(?<segment>/?.*), /api/auth${segment}

        # Campaign Service Routes
        - id: campaign-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/campaigns/**
          filters:
            - RewritePath=/api/campaigns(?<segment>/?.*), /api/campaigns${segment}

        # Appointment Service Routes
        - id: appointment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/appointments/**
          filters:
            - RewritePath=/api/appointments(?<segment>/?.*), /api/appointments${segment}

        # Blood Inventory Service Routes
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/bloodinventories/**
          filters:
            - RewritePath=/api/bloodinventories(?<segment>/?.*), /api/bloodinventories${segment}

        # Emergency Request Service Routes (with context path /request)
        - id: emergency-request-service
          uri: http://localhost:8084
          predicates:
            - Path=/request/**
          filters:
            - RewritePath=/request(?<segment>/?.*), /request${segment}

        # Notification Service Routes
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications(?<segment>/?.*), /api/notifications${segment}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"
