spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://127.0.0.1:3000"
              - "http://127.0.0.1:5173"
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS,PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # User Service Routes - strip /user prefix
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

        # Campaign Service Routes - strip /campaign prefix
        - id: campaign-service
          uri: http://localhost:8082
          predicates:
            - Path=/campaign/**
          filters:
            - StripPrefix=1

        # Blood Inventory Service Routes - strip /inventory prefix
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/inventory/**
          filters:
            - StripPrefix=1

        # Emergency Request Service Routes - strip /request prefix
        - id: emergency-request-service
          uri: http://localhost:8084
          predicates:
            - Path=/request/**
          filters:
            - StripPrefix=1

        # Notification Service Routes - strip /notification prefix
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO